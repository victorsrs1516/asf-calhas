<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 | A.S.F Calhas</title>
  <link rel="icon" type="image/png" href="img/calhas.logo2.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.16), transparent 34%),
        linear-gradient(135deg, #080c10, #111720 55%, #0d1219);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249, 115, 22, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249, 115, 22, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 18s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes gridMove {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(50px, 50px);
      }
    }

    .card {
      width: 100%;
      max-width: 1180px;
      min-height: min(720px, calc(100vh - 36px));
      background: rgba(15, 21, 32, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      backdrop-filter: blur(18px);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.95fr);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      position: relative;
      z-index: 2;
    }

    .left {
      padding: clamp(34px, 5vw, 70px);
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .logo {
      width: clamp(145px, 18vw, 210px);
      height: auto;
      margin-bottom: clamp(24px, 4vw, 38px);
      object-fit: contain;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.35));
    }

    .tag {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(249, 115, 22, 0.12);
      border: 1px solid rgba(249, 115, 22, 0.26);
      color: #f97316;
      padding: 9px 16px;
      border-radius: 999px;
      font-size: clamp(13px, 1.4vw, 15px);
      margin-bottom: clamp(20px, 3vw, 28px);
      white-space: nowrap;
    }

    .tag::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #f97316;
      border-radius: 50%;
      animation: pulse 2s infinite;
      flex: 0 0 auto;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }

    h1 {
      font-size: clamp(76px, 10vw, 132px);
      line-height: 0.88;
      color: #f97316;
      margin-bottom: clamp(12px, 2vw, 18px);
      letter-spacing: clamp(-5px, -0.45vw, -2px);
      font-weight: 900;
    }

    h2 {
      max-width: 620px;
      font-size: clamp(30px, 4.2vw, 56px);
      line-height: 1.05;
      margin-bottom: clamp(18px, 2.5vw, 26px);
      font-weight: 900;
      letter-spacing: -1.5px;
    }

    p {
      max-width: 560px;
      color: rgba(255, 255, 255, 0.68);
      font-size: clamp(16px, 1.8vw, 20px);
      line-height: 1.75;
      margin-bottom: clamp(28px, 4vw, 42px);
      font-weight: 600;
    }

    .buttons {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 56px;
      padding: 15px 26px;
      border-radius: 15px;
      text-decoration: none;
      font-weight: 800;
      font-size: clamp(15px, 1.5vw, 18px);
      transition: 0.25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
    }

    .btn-home {
      background: linear-gradient(135deg, #f97316, #fb923c);
      color: #111;
      box-shadow: 0 12px 30px rgba(249, 115, 22, 0.24);
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(249, 115, 22, 0.34);
    }

    .btn-wa {
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(255, 255, 255, 0.055);
      color: #fff;
    }

    .btn-wa:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
    }

    .right {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(30px, 5vw, 70px);
      min-width: 0;
      overflow: hidden;
    }

    .right::before {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.12), transparent 65%);
      filter: blur(10px);
      z-index: 0;
    }

    .circle {
      width: clamp(230px, 28vw, 370px);
      height: clamp(230px, 28vw, 370px);
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.18), rgba(255, 255, 255, 0.035));
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 4s ease-in-out infinite;
      z-index: 1;
      box-shadow: inset 0 0 40px rgba(249, 115, 22, 0.04);
    }

    .circle::before {
      content: "";
      position: absolute;
      width: 72%;
      height: 72%;
      border-radius: 50%;
      border: 1px dashed rgba(249, 115, 22, 0.35);
    }

    .tool {
      font-size: clamp(76px, 9vw, 122px);
      filter: drop-shadow(0 18px 20px rgba(0, 0, 0, 0.38));
      position: relative;
      z-index: 2;
      user-select: none;
    }

    .drop {
      position: absolute;
      width: clamp(12px, 1.4vw, 17px);
      height: clamp(12px, 1.4vw, 17px);
      background: #f97316;
      border-radius: 50% 50% 50% 0;
      transform: rotate(135deg);
      animation: drip 2.2s infinite;
      z-index: 3;
      box-shadow: 0 6px 16px rgba(249, 115, 22, 0.26);
    }

    .drop1 {
      top: 24%;
      right: 28%;
    }

    .drop2 {
      bottom: 22%;
      left: 29%;
      animation-delay: 0.5s;
    }

    .drop3 {
      bottom: 35%;
      right: 19%;
      animation-delay: 1s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes drip {
      0% {
        transform: translateY(-8px) rotate(135deg);
        opacity: 0;
      }

      35% {
        opacity: 1;
      }

      100% {
        transform: translateY(22px) rotate(135deg);
        opacity: 0;
      }
    }

    @media (max-width: 980px) {
      body {
        align-items: flex-start;
        padding: 16px;
      }

      .card {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .left {
        text-align: center;
        align-items: center;
        padding: 42px 26px 28px;
      }

      .logo {
        margin-left: auto;
        margin-right: auto;
      }

      .tag {
        margin-left: auto;
        margin-right: auto;
      }

      h2 {
        max-width: 720px;
      }

      p {
        max-width: 680px;
        margin-left: auto;
        margin-right: auto;
      }

      .buttons {
        justify-content: center;
      }

      .right {
        padding: 8px 24px 42px;
      }

      .right::before {
        width: 300px;
        height: 300px;
      }

      .circle {
        width: 250px;
        height: 250px;
      }

      .tool {
        font-size: 82px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .card {
        border-radius: 22px;
      }

      .left {
        padding: 34px 20px 24px;
      }

      .logo {
        width: 145px;
        margin-bottom: 24px;
      }

      .tag {
        font-size: 13px;
        padding: 8px 13px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 82px;
        letter-spacing: -3px;
      }

      h2 {
        font-size: 30px;
        line-height: 1.08;
        letter-spacing: -0.8px;
      }

      p {
        font-size: 16px;
        line-height: 1.65;
        margin-bottom: 28px;
      }

      .buttons {
        width: 100%;
        flex-direction: column;
        gap: 12px;
      }

      .btn {
        width: 100%;
        min-height: 54px;
        padding: 14px 18px;
        font-size: 16px;
      }

      .right {
        padding: 2px 20px 34px;
      }

      .circle {
        width: 215px;
        height: 215px;
      }

      .tool {
        font-size: 72px;
      }
    }

    @media (max-width: 380px) {
      .left {
        padding: 28px 16px 22px;
      }

      .logo {
        width: 128px;
      }

      h1 {
        font-size: 70px;
      }

      h2 {
        font-size: 25px;
      }

      p {
        font-size: 15px;
      }

      .circle {
        width: 185px;
        height: 185px;
      }

      .tool {
        font-size: 62px;
      }
    }

    @media (max-height: 720px) and (min-width: 981px) {
      .card {
        min-height: auto;
      }

      .left {
        padding-top: 38px;
        padding-bottom: 38px;
      }

      .logo {
        width: 155px;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 96px;
      }

      h2 {
        font-size: 40px;
      }

      p {
        font-size: 16px;
        margin-bottom: 26px;
      }

      .circle {
        width: 285px;
        height: 285px;
      }

      .tool {
        font-size: 94px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-grid,
      .tag::before,
      .circle,
      .drop {
        animation: none;
      }

      .btn {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>

  <main class="card">
    <section class="left">

      <div class="tag">Página não encontrada</div>

      <h1>404</h1>

      <h2>Ops... parece que essa calha vazou e levou a página junto!</h2>

      <p>
        A página que você tentou acessar não existe,
        foi removida ou o link está errado.
        Mas calma, podemos te levar de volta rapidinho.
      </p>

      <div class="buttons">
        <a href="index.html" class="btn btn-home">Voltar ao início</a>

        <a href="https://api.whatsapp.com/send?phone=554197286325&text=Ol%C3%A1%2C%20quero%20tirar%20umas%20d%C3%BAvidas" target="_blank" rel="noopener" class="btn btn-wa">
          Tirar dúvidas no WhatsApp
        </a>
      </div>
    </section>

    <section class="right" aria-hidden="true">
      <div class="circle">
        <div class="tool">🛠️</div>
        <div class="drop drop1"></div>
        <div class="drop drop2"></div>
        <div class="drop drop3"></div>
      </div>
    </section>
  </main>
</body>
</html>
