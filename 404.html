<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 | A.S.F Calhas</title>
  <link rel="icon" type="image/png" href="img/calhas.logo2.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.15), transparent 35%),
        linear-gradient(135deg, #080c10, #111720 55%, #0d1219);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249, 115, 22, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249, 115, 22, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 18s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      from {
        transform: translate(0, 0);
      }

      to {
        transform: translate(50px, 50px);
      }
    }

    .card {
      width: 100%;
      max-width: 1100px;
      background: rgba(15, 21, 32, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      backdrop-filter: blur(18px);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
      position: relative;
      z-index: 2;
    }

    .left {
      padding: 60px;
      position: relative;
      z-index: 2;
    }

    .logo {
      width: 170px;
      margin-bottom: 35px;
      object-fit: contain;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.35));
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(249, 115, 22, 0.12);
      border: 1px solid rgba(249, 115, 22, 0.22);
      color: #f97316;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 22px;
    }

    .tag::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #f97316;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    h1 {
      font-size: 120px;
      line-height: 0.9;
      color: #f97316;
      margin-bottom: 10px;
      letter-spacing: -5px;
    }

    h2 {
      font-size: 42px;
      line-height: 1.05;
      margin-bottom: 20px;
    }

    p {
      color: rgba(255, 255, 255, 0.68);
      font-size: 17px;
      line-height: 1.8;
      margin-bottom: 35px;
      max-width: 520px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 15px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.25s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-home {
      background: linear-gradient(135deg, #f97316, #fb923c);
      color: #111;
      box-shadow: 0 12px 30px rgba(249, 115, 22, 0.22);
    }

    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 40px rgba(249, 115, 22, 0.32);
    }

    .btn-wa {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .btn-wa:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
    }

    .right {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 500px;
    }

    .circle {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.18), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    .circle::before {
      content: "";
      position: absolute;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      border: 1px dashed rgba(249, 115, 22, 0.35);
    }

    .tool {
      font-size: 110px;
      filter: drop-shadow(0 18px 20px rgba(0, 0, 0, 0.35));
      position: relative;
      z-index: 2;
    }

    .drop {
      position: absolute;
      width: 15px;
      height: 15px;
      background: #f97316;
      border-radius: 50% 50% 50% 0;
      transform: rotate(135deg);
      animation: drip 2.2s infinite;
      z-index: 3;
      box-shadow: 0 6px 16px rgba(249, 115, 22, 0.22);
    }

    .drop1 {
      top: 80px;
      right: 90px;
    }

    .drop2 {
      bottom: 70px;
      left: 90px;
      animation-delay: 0.5s;
    }

    .drop3 {
      bottom: 120px;
      right: 60px;
      animation-delay: 1s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes drip {
      0% {
        transform: translateY(-8px) rotate(135deg);
        opacity: 0;
      }

      35% {
        opacity: 1;
      }

      100% {
        transform: translateY(22px) rotate(135deg);
        opacity: 0;
      }
    }

    @media (max-width: 900px) {
      body {
        overflow-y: auto;
      }

      .card {
        grid-template-columns: 1fr;
      }

      .left {
        padding: 38px 24px;
        text-align: center;
      }

      .buttons {
        justify-content: center;
      }

      .right {
        min-height: 260px;
      }

      .circle {
        width: 230px;
        height: 230px;
      }

      .circle::before {
        width: 160px;
        height: 160px;
      }

      .tool {
        font-size: 75px;
      }

      .drop {
        width: 12px;
        height: 12px;
      }

      .drop1 {
        top: 58px;
        right: 63px;
      }

      .drop2 {
        bottom: 50px;
        left: 64px;
      }

      .drop3 {
        bottom: 86px;
        right: 44px;
      }

      h1 {
        font-size: 90px;
      }

      h2 {
        font-size: 32px;
      }

      p {
        margin: 0 auto 30px;
      }
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 72px;
      }

      h2 {
        font-size: 26px;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .logo {
        width: 145px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>

  <div class="card">
    <div class="left">
      <img src="img/calhas.logo2.png" alt="Logo A.S.F Calhas" class="logo">

      <div class="tag">Página não encontrada</div>

      <h1>404</h1>

      <h2>Ops... parece que essa calha vazou e levou a página junto!</h2>

      <p>
        A página que você tentou acessar não existe,
        foi removida ou o link está errado.
        Mas calma, podemos te levar de volta rapidinho.
      </p>

      <div class="buttons">
        <a href="index.html" class="btn btn-home">Voltar ao início</a>

        <a href="https://api.whatsapp.com/send?phone=554197286325&text=Ol%C3%A1%2C%20quero%20fazer%20um%20or%C3%A7amento" target="_blank" rel="noopener" class="btn btn-wa">
          Pedir orçamento
        </a>
      </div>
    </div>

    <div class="right">
      <div class="circle">
        <div class="tool">🛠️</div>
        <div class="drop drop1"></div>
        <div class="drop drop2"></div>
        <div class="drop drop3"></div>
      </div>
    </div>
  </div>
</body>
</html>
